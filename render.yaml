# Render Blueprint for Taskora.
#
# This defines a standalone, independently-named Web Service so it can sit
# in the same Render account as other projects without any naming, port, or
# env-var collisions. Nothing here touches or references any other service
# on the account.
#
# This version uses Render's Starter plan (~$7/month) with a persistent
# disk attached, so test data you add (new users, jobs, approvals, etc.)
# actually survives redeploys and idle spin-downs instead of resetting.

services:
  - type: web
    name: taskora-api
    runtime: node
    plan: starter
    region: oregon                # pick whichever region is closest to you
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: TASKORA_JWT_SECRET
        generateValue: true       # Render generates a strong random secret — never commit one
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data          # points the JSON datastore at the persistent disk below
    disk:
      name: taskora-data
      mountPath: /var/data
      sizeGB: 1                   # plenty of headroom for JSON test data; resize anytime

# First deploy boots with an empty disk, so it auto-seeds demo data once.
# Every deploy after that leaves your real data alone — the seed only runs
# when the disk is genuinely empty (see src/seed.js -> seedIfEmpty()).
#
# To go back to clean demo data on purpose: open a Render Shell for this
# service (Dashboard -> your service -> Shell) and run: npm run seed
