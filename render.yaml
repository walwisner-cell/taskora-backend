# Render Blueprint for Taskora.
#
# This defines a standalone, independently-named Web Service so it can sit
# in the same Render account as other projects without any naming, port, or
# env-var collisions. Nothing here touches or references any other service
# on the account.
#
# This is currently configured for the Starter plan with a persistent disk
# (~$7.25/month) — matching what's actually deployed — so test data (new
# users, jobs, approvals, etc.) survives redeploys and idle spin-downs
# instead of resetting. See "ADDING REAL POSTGRES" below for the next step
# up from disk-based JSON storage.

services:
  - type: web
    name: taskora-api
    runtime: node
    plan: starter
    region: oregon                # pick whichever region is closest to you
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: TASKORA_JWT_SECRET
        generateValue: true       # Render generates a strong random secret — never commit one
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data          # points the JSON datastore at the persistent disk below
      - key: UPLOADS_DIR
        value: /var/data/uploads  # portfolio photos live on the same persistent disk, in their own subfolder
      # Add this once you've created a Render Postgres instance (see below) —
      # uncommenting this alone is what switches the app from the JSON-file
      # store to real Postgres. No code change needed; db.js picks the
      # backend automatically based on whether this is set. Note: Postgres
      # only replaces the JSON datastore — UPLOADS_DIR above still needs the
      # disk (or S3 at larger scale) regardless, since Postgres stores data,
      # not image files.
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: taskora-db
      #     property: connectionString
    disk:
      name: taskora-data
      mountPath: /var/data
      sizeGB: 1

# ── ADDING REAL POSTGRES (recommended before real users touch this) ─────────
# The JSON-file store above is fully real and correct, but a single flat
# file per table isn't what you'd want under real concurrent traffic. To
# switch to Postgres:
#
#   1. In the Render dashboard: "New +" → "PostgreSQL". Name it (e.g.
#      "taskora-db"), pick the free tier to start, create it.
#   2. Back in this file, uncomment the DATABASE_URL env var above and make
#      sure the `name:` under fromDatabase matches exactly what you named
#      the Postgres instance in step 1.
#   3. Commit and push — Render will wire the connection string in
#      automatically and redeploy.
#   4. First boot creates all tables automatically (src/schema.sql runs on
#      startup) and seeds demo data since the database starts empty — same
#      auto-seed-once behavior as the disk-based version.
#
# This has been tested end-to-end against a real Postgres database — full
# signup/login, AI matching, escrow, reviews, messaging, regional admin
# scoping, all pass identically to the JSON-file version. The switch is a
# config change, not a code change.
